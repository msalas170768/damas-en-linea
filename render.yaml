services:
  # ── Backend: Node.js Web Service ──────────────────────────────────────────
  - type: web
    name: damas-server
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Set this to the client's Render URL after the client is deployed.
      # Accepts a single origin (https://damas-client.onrender.com)
      # or * to allow all origins during initial setup.
      - key: CLIENT_URL
        sync: false

  # ── Frontend: Static Site ─────────────────────────────────────────────────
  - type: web
    name: damas-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Set this to the server's Render URL before deploying the client.
      # Example: https://damas-server.onrender.com
      - key: VITE_SOCKET_URL
        sync: false
